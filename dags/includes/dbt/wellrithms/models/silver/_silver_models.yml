models: 
  - name: silver_test_data_versions
    description: Versioned test data for Wellrithms Candidate Review 
    columns: 
    - name: primary_key
      description: Concat _path and converted_at as a derived unique id
      data_tests: 
        - not_null
        - unique
    - name: _path
      description: s3 location of source json file
      data_tests: 
        - not_null
    - name: converted_at
      description: timestamp of when the file was converted from csv to json (a proxy for ingested timestamp)
      data_tests: 
        - not_null
    - name: item_key
      description: Concat service_provider, claimant_id, and claim_item_id to create key to track versions of by converted_at timestamp
      data_tests: 
        - not_null
    - name: item_key_version
      description: represents the order asc in which an item_key was converted_at
      data_tests: 
        - not_null

  - name: silver_test_data_current
    description: Current version of test data for Wellrithms Candidate Review 
    columns: 
    - name: primary_key
      description: Concat _path and converted_at as a derived unique id
      data_tests: 
        - not_null
        - unique
    - name: _path
      description: s3 location of source json file
      data_tests: 
        - not_null
    - name: converted_at
      description: timestamp of when the file was converted from csv to json (a proxy for ingested timestamp)
      data_tests: 
        - not_null
    - name: item_key
      description: Concat service_provider, claimant_id, and claim_item_id to create key to track versions of by converted_at timestamp
      data_tests: 
        - not_null
        - unique
    - name: item_key_version
      description: the most recently converted_at version of an item_key
      data_tests: 
        - not_null
