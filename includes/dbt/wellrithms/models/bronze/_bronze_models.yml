models: 
  - name: bronze_test_data
    description: Raw test data for Wellrithms Candidate Review converted from CSV to JSON format
    columns: 
    - name: _path
      description: s3 location of source json file
      data_tests: 
        - not_null
    - name: converted_at
      description: timestamp of when the file was converted from csv to json (a proxy for ingested timestamp)
      data_tests: 
        - not_null
